<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}RHMail — AI 智能邮件分析{% endblock %}</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('rhmail_theme') || 'dark-indigo';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="stylesheet" href="/static/style.css?v=5.0">
  <script src="/static/marked.min.js?v=1.0"></script>
</head>
<body class="app-shell-body">
  <div class="app-shell">
    <!-- 顶部 Topbar Header -->
    <header class="topbar">
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <button class="topbar-sidebar-toggle" id="topbarSidebarToggle" title="切换侧边栏" aria-label="切换侧边栏">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <a href="/" class="brand">
          <div class="brand-logo">
            <img src="/static/logo.png" alt="RHCLOUD Logo">
          </div>
          <span>RHMail AI</span>
        </a>
      </div>

      <div class="topbar-right" style="display: flex; align-items: center; gap: 0.75rem;">
        <form action="/logout" method="post" style="display:inline">
          <button class="link-btn" title="安全退出">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            <span class="btn-text">登出</span>
          </button>
        </form>

        <!-- 版权信息 -->
        <div style="position:relative;display:inline-block;" id="aboutPicker">
          <button id="aboutPickerBtn" title="关于 RHMail" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:transparent;border:none;color:inherit;opacity:0.4;cursor:pointer;padding:0;transition:opacity .15s;" onmouseenter="this.style.opacity='.8'" onmouseleave="this.style.opacity='.4'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          </button>
          <div id="aboutMenu" style="display:none;position:absolute;top:calc(100% + 8px);right:0;width:200px;background:var(--dropdown-bg,#1a2035);border:1px solid var(--border,rgba(255,255,255,.1));border-radius:10px;padding:12px 14px;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:300;flex-direction:column;gap:7px;font-size:12px;backdrop-filter:blur(16px);">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.4;margin-bottom:2px;">关于 RHMail</div>
            <div style="display:flex;justify-content:space-between;"><span style="opacity:.5;">公司</span><span style="font-weight:500;">RHcloud</span></div>
            <div style="display:flex;justify-content:space-between;"><span style="opacity:.5;">版本</span><span style="font-weight:500;">v1.0</span></div>
            <div style="height:1px;background:var(--border,rgba(255,255,255,.1));margin:2px 0;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;"><span style="opacity:.5;">反馈</span><a href="mailto:ceo@985.edu.kg" style="color:var(--primary,#6366f1);text-decoration:none;font-size:11px;">ceo@985.edu.kg</a></div>
            <div style="opacity:.35;font-size:10px;margin-top:2px;">© 2026 RHcloud. All rights reserved.</div>
          </div>
        </div>

        <!-- 皮肤切换组件 -->
        <div class="theme-picker" id="themePicker">
          <button class="theme-picker-btn" id="themePickerBtn" title="切换主题皮肤" aria-label="切换主题皮肤">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle>
              <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle>
              <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle>
              <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle>
              <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.7-.72 1.7-1.61 0-.43-.17-.83-.44-1.13-.27-.3-.42-.69-.42-1.12 0-.9.72-1.64 1.61-1.64h1.9c3.1 0 5.65-2.55 5.65-5.65 0-4.85-4.4-8.86-9.9-8.86z"></path>
            </svg>
          </button>
          
          <div class="theme-menu" id="themeMenu">
            <div class="theme-menu-title">选择系统皮肤</div>
            <button class="theme-option" data-theme-id="dark-indigo">
              <span class="theme-swatch dark-indigo-swatch"></span>
              <span class="theme-name">深邃星空</span>
              <svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
            <button class="theme-option" data-theme-id="light">
              <span class="theme-swatch light-swatch"></span>
              <span class="theme-name">极简日光</span>
              <svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
            <button class="theme-option" data-theme-id="emerald">
              <span class="theme-swatch emerald-swatch"></span>
              <span class="theme-name">翡翠极光</span>
              <svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
            <button class="theme-option" data-theme-id="violet">
              <span class="theme-swatch violet-swatch"></span>
              <span class="theme-name">紫罗兰暗影</span>
              <svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- 应用程序核心主体 (下半部分) -->
    <div class="app-body">
      <!-- 全局侧边栏组件 -->
      {% include "sidebar.html" %}

      <!-- 移动端侧边栏遮罩 -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- 右侧独立滚动主内容区域 -->
      <main class="gmail-content">
        {% block body %}{% endblock %}
      </main>
    </div>
  </div>

  <!-- 移动端底部导航栏 -->
  <nav class="mobile-bottom-nav">
    <a href="/" class="mobile-nav-item" id="mnav-dashboard">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
      <span>概览</span>
    </a>
    <a href="/emails" class="mobile-nav-item" id="mnav-emails">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
      <span>邮件</span>
    </a>
    <a href="/digests" class="mobile-nav-item" id="mnav-digests">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      <span>日报</span>
    </a>
    <a href="/accounts" class="mobile-nav-item" id="mnav-accounts">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline><line x1="2" y1="20" x2="10" y2="12"></line><line x1="22" y1="20" x2="14" y2="12"></line></svg>
      <span>邮箱</span>
    </a>
  </nav>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const path = window.location.pathname;
      if (path === '/') {
        document.getElementById('snav-dashboard')?.classList.add('active');
        document.getElementById('mnav-dashboard')?.classList.add('active');
      } else if (path.startsWith('/emails')) {
        document.getElementById('snav-emails')?.classList.add('active');
        document.getElementById('mnav-emails')?.classList.add('active');
      } else if (path.startsWith('/digests')) {
        document.getElementById('snav-digests')?.classList.add('active');
        document.getElementById('mnav-digests')?.classList.add('active');
      } else if (path.startsWith('/accounts')) {
        document.getElementById('snav-accounts')?.classList.add('active');
        document.getElementById('mnav-accounts')?.classList.add('active');
      }

      // 侧边栏折叠与移动端 Drawer 控制
      const topbarSidebarToggle = document.getElementById('topbarSidebarToggle');
      const sidebarCollapseBtn = document.getElementById('sidebarCollapseBtn');
      const sidebarOverlay = document.getElementById('sidebarOverlay');

      function isMobile() {
        return window.innerWidth <= 768;
      }

      function toggleSidebar() {
        if (isMobile()) {
          document.body.classList.toggle('drawer-open');
        } else {
          document.body.classList.toggle('sidebar-collapsed');
          const isCollapsed = document.body.classList.contains('sidebar-collapsed');
          localStorage.setItem('rhmail_sidebar_collapsed', isCollapsed ? 'true' : 'false');
        }
      }

      // 恢复桌面端折叠状态
      if (!isMobile() && localStorage.getItem('rhmail_sidebar_collapsed') === 'true') {
        document.body.classList.add('sidebar-collapsed');
      }

      topbarSidebarToggle?.addEventListener('click', toggleSidebar);
      sidebarCollapseBtn?.addEventListener('click', toggleSidebar);
      sidebarOverlay?.addEventListener('click', () => {
        document.body.classList.remove('drawer-open');
      });

      // 皮肤切换交互逻辑
      const themePicker = document.getElementById('themePicker');
      const themePickerBtn = document.getElementById('themePickerBtn');
      const themeOptions = document.querySelectorAll('.theme-option');

      function applyTheme(themeId) {
        document.documentElement.setAttribute('data-theme', themeId);
        document.body.setAttribute('data-theme', themeId);
        localStorage.setItem('rhmail_theme', themeId);
        updateActiveThemeUI(themeId);
      }

      function updateActiveThemeUI(currentTheme) {
        themeOptions.forEach(opt => {
          if (opt.getAttribute('data-theme-id') === currentTheme) {
            opt.classList.add('active');
          } else {
            opt.classList.remove('active');
          }
        });
      }

      const initialTheme = localStorage.getItem('rhmail_theme') || 'dark-indigo';
      applyTheme(initialTheme);

      themePickerBtn?.addEventListener('click', (e) => {
        e.stopPropagation();
        themePicker?.classList.toggle('open');
      });

      document.addEventListener('click', () => {
        themePicker?.classList.remove('open');
      });

      themeOptions.forEach(opt => {
        opt.addEventListener('click', (e) => {
          e.stopPropagation();
          const themeId = opt.getAttribute('data-theme-id');
          applyTheme(themeId);
          themePicker?.classList.remove('open');
        });
      });

      // 版权信息弹窗
      const aboutPicker = document.getElementById('aboutPicker');
      const aboutMenu = document.getElementById('aboutMenu');
      document.getElementById('aboutPickerBtn')?.addEventListener('click', (e) => {
        e.stopPropagation();
        const open = aboutMenu.style.display === 'flex';
        aboutMenu.style.display = open ? 'none' : 'flex';
      });
      document.addEventListener('click', () => { if (aboutMenu) aboutMenu.style.display = 'none'; });

      // Markdown 客户端自动高精渲染
      function renderMarkdownBlocks() {
        if (typeof marked === 'undefined') return;
        document.querySelectorAll('.markdown-body').forEach(box => {
          const rawEl = box.querySelector('.markdown-raw');
          const targetEl = box.querySelector('.markdown-target');
          if (rawEl && targetEl) {
            targetEl.innerHTML = marked.parse(rawEl.value);
          }
        });
      }
      renderMarkdownBlocks();
    });
  </script>
</body>
</html>
