<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 — 邮件分析</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>&#128140; 邮件分析</h1>
    <p class="muted">输入密码登录看板</p>
    <form id="f" method="post" action="/login">
      <input type="password" name="password" placeholder="密码" required autofocus>
      <button type="submit">登录</button>
    </form>
    <p id="err" class="err"></p>
  </div>
  <script>
    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const r = await fetch('/login', {method: 'POST', body: fd, redirect: 'follow'});
      if (r.redirected) {
        location.href = r.url;
      } else {
        document.getElementById('err').textContent = '密码错误,请重试';
      }
    });
  </script>
</body>
</html>
