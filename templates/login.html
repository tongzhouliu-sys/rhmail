<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 — RHMail AI 智能看板</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('rhmail_theme') || 'dark-indigo';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="stylesheet" href="/static/style.css?v=2.1">
</head>
<body class="login-page">
  <!-- 背景动态光晕效果 -->
  <div class="login-bg-glow glow-1"></div>
  <div class="login-bg-glow glow-2"></div>

  <!-- 右上角皮肤切换控制 -->
  <div class="login-topbar">
    <div class="theme-picker" id="themePicker">
      <button class="theme-picker-btn" id="themePickerBtn" title="切换主题皮肤" aria-label="切换主题皮肤">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle>
          <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle>
          <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle>
          <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle>
          <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.92 0 1.7-.72 1.7-1.61 0-.43-.17-.83-.44-1.13-.27-.3-.42-.69-.42-1.12 0-.9.72-1.64 1.61-1.64h1.9c3.1 0 5.65-2.55 5.65-5.65 0-4.85-4.4-8.86-9.9-8.86z"></path>
        </svg>
      </button>
      <div class="theme-menu" id="themeMenu">
        <div class="theme-menu-title">选择系统皮肤</div>
        <button class="theme-option" data-theme-id="dark-indigo">
          <span class="theme-swatch dark-indigo-swatch"></span>
          <span class="theme-name">深邃星空</span>
          <svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </button>
        <button class="theme-option" data-theme-id="light">
          <span class="theme-swatch light-swatch"></span>
          <span class="theme-name">极简日光</span>
          <svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </button>
        <button class="theme-option" data-theme-id="emerald">
          <span class="theme-swatch emerald-swatch"></span>
          <span class="theme-name">翡翠极光</span>
          <svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </button>
        <button class="theme-option" data-theme-id="violet">
          <span class="theme-swatch violet-swatch"></span>
          <span class="theme-name">紫罗兰暗影</span>
          <svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand-header">
        <div class="brand-logo login-logo">
          <img src="/static/logo.png" alt="RHCLOUD Logo">
        </div>
        <h1>RHMail AI</h1>
        <div class="company-badge">RHCLOUD ENTERPRISE</div>
      </div>
      
      <p class="muted">安全校验 · 接入 AI 智能邮件分析看板</p>

      <form id="f" method="post" action="/login">
        <div class="input-group">
          <svg class="input-icon left-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="pwdInput" name="password" placeholder="请输入系统访问密码" required autofocus>
          <button type="button" id="togglePwd" class="toggle-pwd-btn" title="显示/隐藏密码" aria-label="显示/隐藏密码">
            <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>

        <button type="submit" id="submitBtn" class="login-submit-btn">
          <span>解 锁 登 录</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </form>

      <p id="err" class="err"></p>
    </div>

    <!-- 底部版权信息 -->
    <footer class="login-footer">
      <p>© 2026 <strong>RHCLOUD</strong>. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // 密码可见性切换
      const pwdInput = document.getElementById('pwdInput');
      const togglePwd = document.getElementById('togglePwd');
      togglePwd?.addEventListener('click', () => {
        const isPwd = pwdInput.type === 'password';
        pwdInput.type = isPwd ? 'text' : 'password';
        togglePwd.classList.toggle('active', isPwd);
      });

      // 登录表单提交
      const form = document.getElementById('f');
      const submitBtn = document.getElementById('submitBtn');
      const errEl = document.getElementById('err');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.textContent = '';
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');
        const originalBtnHtml = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span>验 证 中...</span>';

        try {
          const fd = new FormData(form);
          const r = await fetch('/login', {method: 'POST', body: fd, redirect: 'follow'});
          if (r.redirected) {
            location.href = r.url;
          } else {
            errEl.textContent = '密码验证失败，请核对后重试';
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnHtml;
          }
        } catch (err) {
          errEl.textContent = '网络连接异常，请稍后再试';
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalBtnHtml;
        }
      });

      // 皮肤切换交互
      const themePicker = document.getElementById('themePicker');
      const themePickerBtn = document.getElementById('themePickerBtn');
      const themeOptions = document.querySelectorAll('.theme-option');

      function applyTheme(themeId) {
        document.documentElement.setAttribute('data-theme', themeId);
        document.body.setAttribute('data-theme', themeId);
        localStorage.setItem('rhmail_theme', themeId);
        themeOptions.forEach(opt => {
          opt.classList.toggle('active', opt.getAttribute('data-theme-id') === themeId);
        });
      }

      const initialTheme = localStorage.getItem('rhmail_theme') || 'dark-indigo';
      applyTheme(initialTheme);

      themePickerBtn?.addEventListener('click', (e) => {
        e.stopPropagation();
        themePicker?.classList.toggle('open');
      });

      document.addEventListener('click', () => {
        themePicker?.classList.remove('open');
      });

      themeOptions.forEach(opt => {
        opt.addEventListener('click', (e) => {
          e.stopPropagation();
          applyTheme(opt.getAttribute('data-theme-id'));
          themePicker?.classList.remove('open');
        });
      });
    });
  </script>
</body>
</html>
